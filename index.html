var OperationType;
(function (OperationType) {
    OperationType["CREATE"] = "create";
    OperationType["UPDATE"] = "update";
    OperationType["DELETE"] = "delete";
    OperationType["LIST"] = "list";
    OperationType["GET"] = "get";
    OperationType["WRITE"] = "write";
})(OperationType || (OperationType = {}));

function handleFirestoreError(error, operationType, path) {
    const errInfo = {
        error: error instanceof Error ? error.message : String(error),
        authInfo: { userId: null, email: null },
        operationType,
        path
    };
    throw new Error(JSON.stringify(errInfo));
}

const LOCAL_LEADERBOARD_KEY = "waste_sorting_game_leaderboard";
function getLocalLeaderboard() {
    const data = localStorage.getItem(LOCAL_LEADERBOARD_KEY);
    if (!data) return getMockLeaderboard();
    try { return JSON.parse(data); } catch (e) { return getMockLeaderboard(); }
}
function saveLocalLeaderboard(entries) {
    localStorage.setItem(LOCAL_LEADERBOARD_KEY, JSON.stringify(entries));
}
function getMockLeaderboard() {
    const mockData = [
        { name: "분리배출고수", score: 1250, attempts: 24, accuracy: 95, date: "2026-07-08" },
        { name: "에코워리어", score: 1080, attempts: 22, accuracy: 90, date: "2026-07-07" },

    ];
    localStorage.setItem(LOCAL_LEADERBOARD_KEY, JSON.stringify(mockData));
    return mockData;
}

export async function saveLeaderboardEntry(entry) {
    const cleanEntry = {
        name: entry.name,
        score: entry.score,
        attempts: entry.attempts,
        accuracy: entry.accuracy,
        date: entry.date,
    };
    if (isFirebaseConfigured && db) {
        const path = "leaderboard";
        try {
            if (entry.id) {
                await setDoc(doc(db, path, entry.id), cleanEntry);
            } else {
                await addDoc(collection(db, path), cleanEntry);
            }
        } catch (error) {
            handleFirestoreError(error, OperationType.WRITE, path);
        }
    } else {
        const localList = getLocalLeaderboard();
        if (entry.id) {
            const existingIndex = localList.findIndex((e) => e.id === entry.id);
            if (existingIndex !== -1) localList[existingIndex] = { ...cleanEntry, id: entry.id };
            else localList.push({ ...cleanEntry, id: entry.id });
        } else {
            localList.push(cleanEntry);
        }
        localList.sort((a, b) => b.score - a.score);
        saveLocalLeaderboard(localList.slice(0, 100));
    }
}

export async function getLeaderboardEntries() {
    if (isFirebaseConfigured && db) {
        const path = "leaderboard";
        try {
            const q = query(collection(db, path), orderBy("score", "desc"), limit(20));
            const querySnapshot = await getDocs(q);
            const entries = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                entries.push({
                    id: doc.id,
                    name: data.name || "익명",
                    score: data.score || 0,
                    attempts: data.attempts || 0,
                    accuracy: data.accuracy || 0,
                    date: data.date || "",
                });
            });
            if (entries.length === 0) return getLocalLeaderboard();
            return entries;
        } catch (error) {
            return getLocalLeaderboard();
        }
    } else {
        return getLocalLeaderboard().sort((a, b) => b.score - a.score);
    }
}

export function isUsingFirebase() { return isFirebaseConfigured && db !== null; }

export function subscribeToLeaderboard(callback) {
    if (isFirebaseConfigured && db) {
        const path = "leaderboard";
        const q = query(collection(db, path), orderBy("score", "desc"), limit(20));
        try {
            return onSnapshot(q, (querySnapshot) => {
                const entries = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    entries.push({
                        id: doc.id,
                        name: data.name || "익명",
                        score: data.score || 0,
                        attempts: data.attempts || 0,
                        accuracy: data.accuracy || 0,
                        date: data.date || "",
                    });
                });
                if (entries.length === 0) callback(getLocalLeaderboard());
                else callback(entries);
            }, (error) => {
                callback(getLocalLeaderboard());
                handleFirestoreError(error, OperationType.GET, path);
            });
        } catch (error) {
            callback(getLocalLeaderboard());
            return () => { };
        }
    } else {
        callback(getLocalLeaderboard().sort((a, b) => b.score - a.score));
