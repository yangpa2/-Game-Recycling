const LOCAL_KEY = "waste_sorting_leaderboard_v1";
function getLocalLeaderboard() {
    const data = localStorage.getItem(LOCAL_KEY);
    if (!data) {
        const mock = [
            { name: "분리배출고수", score: 1250, attempts: 24, accuracy: 95, date: "2026-07-08" },
            { name: "에코워리어", score: 1080, attempts: 22, accuracy: 90, date: "2026-07-07" },
            { name: "초록지구인", score: 960, attempts: 20, accuracy: 85, date: "2026-07-08" }
        ];
        localStorage.setItem(LOCAL_KEY, JSON.stringify(mock));
        return mock;
    }
    try { return JSON.parse(data); } catch (e) { return []; }
}

function saveLocalLeaderboard(entries) {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(entries));
}

function subscribeToLeaderboard(callback) {
    if (db) {
        try {
            const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(20));
            return onSnapshot(q, (snap) => {
                const entries = [];
                snap.forEach((doc) => {
                    const d = doc.data();
                    entries.push({ id: doc.id, ...d });
                });
                callback(entries.length > 0 ? entries : getLocalLeaderboard());
            }, () => {
                callback(getLocalLeaderboard());
            });
        } catch (e) {
            callback(getLocalLeaderboard());
            return () => {};
        }
    } else {
        callback(getLocalLeaderboard());
        return () => {};
    }
}

async function saveLeaderboardEntry(entry) {
    if (db) {
        try {
            await addDoc(collection(db, "leaderboard"), entry);
            return;
        } catch (e) {
            console.error("Firebase 저장 실패, 로컬 저장 전환");
        }
    }
    const local = getLocalLeaderboard();
    local.push(entry);
    local.sort((a, b) => b.score - a.score);
    saveLocalLeaderboard(local.slice(0, 50));
}
